<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech &amp; Legal Tech Trends Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234F46E5'/%3E%3Cpath d='M7 22V14l5-4v12m3 0V10l5 6v6m3 0V8l5 8v6' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Loading dashboard data&hellip;</p>
  </div>

  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-inner">
      <div class="header-left">
        <h1 class="dashboard-title">Trends Dashboard</h1>
        <span class="dashboard-subtitle">Tech &amp; Legal Tech Intelligence</span>
      </div>
      <nav class="header-nav" id="section-nav">
        <a href="#section-weekly-snapshot" class="nav-pill">Snapshot</a>
        <a href="#section-topic-heatmap" class="nav-pill">Heatmap</a>
        <a href="#section-trend-lines" class="nav-pill">Trends</a>
        <a href="#section-ai-economy" class="nav-pill">Economy</a>
        <a href="#section-regulatory-pulse" class="nav-pill">Regulatory</a>
        <a href="#section-legal-tech-signals" class="nav-pill">Legal Tech</a>
        <a href="#section-key-voices" class="nav-pill">Voices</a>
      </nav>
      <div class="header-right">
        <label for="week-selector" class="week-label">Period:</label>
        <select id="week-selector" class="week-selector"></select>
        <span id="active-filter" class="active-filter" style="display:none"></span>
        <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
      </div>
    </div>
  </header>

  <!-- Data meta bar -->
  <div id="data-meta-bar" class="data-meta-bar" style="display:none">
    <span id="meta-last-updated" class="meta-item"></span>
    <span class="meta-sep">·</span>
    <span id="meta-digest-range" class="meta-item"></span>
    <span class="meta-sep">·</span>
    <span id="meta-sources" class="meta-item"></span>
    <span class="meta-sep">·</span>
    <span id="meta-articles" class="meta-item"></span>
  </div>

  <!-- Main content -->
  <main class="dashboard-main">

    <!-- Section 7: Weekly Snapshot (top of page) -->
    <section id="section-weekly-snapshot" class="dashboard-section section-full"></section>

    <!-- Section 1: Topic Heatmap -->
    <section id="section-topic-heatmap" class="dashboard-section section-full"></section>

    <!-- Section: Weekly Diff -->
    <section id="section-weekly-diff" class="dashboard-section section-full"></section>

    <!-- Section 6: Trend Lines -->
    <section id="section-trend-lines" class="dashboard-section section-full"></section>

    <!-- Two-column row: AI Economy + Regulatory Pulse -->
    <div class="section-row">
      <!-- Section 2: AI Economy Tracker -->
      <section id="section-ai-economy" class="dashboard-section section-half"></section>

      <!-- Section 3: Regulatory Pulse -->
      <section id="section-regulatory-pulse" class="dashboard-section section-half"></section>
    </div>

    <!-- Two-column row: Legal Tech Signals + Key Voices -->
    <div class="section-row">
      <!-- Section 4: Legal Tech Signals -->
      <section id="section-legal-tech-signals" class="dashboard-section section-half"></section>

      <!-- Section 5: Key Voices -->
      <section id="section-key-voices" class="dashboard-section section-half"></section>
    </div>

  </main>

  <!-- Footer -->
  <footer class="dashboard-footer">
    <p>Newsletter Digest Trends &mdash; Updated automatically from digest runs · <a href="https://github.com/rbpasternak-tech/bexperiments" target="_blank" rel="noopener">Source</a></p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
